    /* Page: Settings — PoC-Starter---SF-Symbol 8197:6434. Shared: tokens.css + shell.css */

    /* Header — Figma: status 44px + nav 54px; horizontal inset 20px */
    .nav-header {
      position: absolute;
      left: 0;
      right: 0;
      top: var(--layout-status-bar-h);
      width: 100%;
      max-width: var(--layout-screen-w);
      margin: 0 auto;
      height: var(--layout-nav-bar-h);
      padding: 0 var(--margin-wide);
      background: var(--color-bg-app);
      display: flex;
      align-items: center;
      box-sizing: border-box;
    }

    .nav-header__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 0;
    }

    .nav-header__left {
      display: flex;
      align-items: center;
      width: 24px;
      flex-shrink: 0;
    }

    .nav-header__title {
      flex: 1 1 0;
      min-width: 0;
      margin: 0;
      font-size: var(--text-nav-title-size);
      font-weight: var(--text-nav-title-weight);
      line-height: var(--text-nav-title-line);
      letter-spacing: var(--text-nav-title-track);
      text-align: center;
      color: var(--color-text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-header__right {
      width: 24px;
      height: 21px;
      flex-shrink: 0;
    }

    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      padding: 0;
      border: none;
      background: transparent;
      color: var(--color-text-secondary);
      cursor: default;
    }

    /* Main: below nav + 24px; horizontal 20px; 24px between Go Plus and list */
    .content {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(
        var(--layout-status-bar-h) + var(--layout-nav-bar-h) + var(--layout-section-gap)
      );
      bottom: 100px;
      padding: 0 var(--margin-wide) 16px;
      display: flex;
      flex-direction: column;
      gap: var(--layout-section-gap);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Subscribe card */
    .subscribe {
      width: 100%;
      background: var(--color-brand-light);
      border: 1px solid var(--color-brand-base);
      border-radius: var(--radius-medium);
      overflow: hidden;
    }

    .subscribe__inner {
      padding: 16px 20px;
    }

    .subscribe__row {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    .subscribe__icon {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      color: var(--color-brand-base);
    }

    .subscribe__body {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .subscribe__text {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .subscribe__title {
      margin: 0;
      font-size: var(--text-body-size);
      font-weight: var(--text-body-em-weight);
      line-height: var(--text-body-line);
      letter-spacing: var(--text-body-track);
      color: var(--color-brand-base);
    }

    .subscribe__subtitle {
      margin: 0;
      font-size: var(--text-caption-size);
      font-weight: var(--text-subhead-weight);
      line-height: var(--text-caption-line);
      letter-spacing: var(--text-caption-track);
      color: var(--color-text-secondary);
    }

    .btn-upgrade {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 30px;
      padding: 6px 10px;
      gap: 4px;
      border: none;
      border-radius: var(--radius-full);
      background: var(--color-brand-base);
      color: var(--color-text-wt-primary);
      font-size: var(--text-subhead-btn-size);
      font-weight: var(--text-body-em-weight);
      line-height: var(--text-subhead-btn-line);
      letter-spacing: var(--text-subhead-btn-track);
      text-decoration: none;
      cursor: pointer;
    }

    /* List card */
    .list-card {
      width: 100%;
      background: var(--color-bg-card);
      border-radius: var(--radius-medium);
      overflow: hidden;
    }

    .list-row {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: var(--layout-list-row-h);
      padding: 0 var(--margin-regular);
      width: 100%;
    }

    .list-row__inner {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      padding-bottom: 1px;
    }

    .list-row__inner--with-separator {
      padding-bottom: 0;
      justify-content: flex-start;
    }

    .list-row__inner--with-separator .list-row__line {
      flex: 1 1 auto;
      min-height: 0;
    }

    .list-row__line {
      display: flex;
      align-items: center;
      width: 100%;
      flex: 1;
      min-height: 0;
    }

    .list-row__title-wrap {
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: var(--layout-list-row-h);
      min-width: 0;
    }

    .list-row__title {
      margin: 0;
      min-height: 22px;
      font-size: var(--text-body-size);
      font-weight: var(--text-body-em-weight);
      line-height: var(--text-body-line);
      letter-spacing: var(--text-body-track);
      color: var(--color-text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .list-row__trail {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
      height: 100%;
      line-height: 0;
    }

    .list-row__chevron {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-disabled);
    }

    .list-separator {
      height: 1px;
      width: 100%;
      background: var(--color-border-disabled);
      flex-shrink: 0;
    }

    /* Bottom — copyright + home indicator */
    .bottom {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      max-width: var(--layout-screen-w);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .copyright {
      margin: 0;
      width: 100%;
      text-align: center;
      font-size: var(--text-caption-size);
      font-weight: var(--text-body-weight);
      line-height: var(--text-caption-line);
      letter-spacing: var(--text-caption-track);
      color: var(--color-text-tertiary);
    }

  </style>
</head>
